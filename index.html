<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клинико-сестринская шкала риска</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--primary-hover:#1d4ed8;--bg-color:#f3f4f6;--card-bg:#ffffff;--text-main:#111827;--text-muted:#4b5563;--border-color:#d1d5db;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--dark-red:#991b1b}
        body{font-family:'Inter',sans-serif;background-color:var(--bg-color);color:var(--text-main);line-height:1.5;margin:0;padding:20px}
        .container{max-width:760px;margin:0 auto;background:var(--card-bg);padding:32px;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h2{font-size:24px;font-weight:700;margin:0 0 24px;padding-bottom:16px;border-bottom:2px solid var(--bg-color)}
        .section{margin-bottom:32px;padding:24px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px}
        .section h3{margin:0 0 20px;font-size:18px;color:#374151}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
        .field{display:flex;flex-direction:column;gap:6px}
        .field.full{grid-column:1/-1}
        label{font-size:14px;font-weight:600;color:var(--text-muted)}
        input,select{padding:10px 12px;border:1px solid var(--border-color);border-radius:6px;font-family:inherit;font-size:14px;width:100%;box-sizing:border-box}
        input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
        .radio-group,.checkbox-group{display:flex;flex-direction:column;gap:8px;padding:8px 0}
        .radio-group.row,.checkbox-group.row{flex-direction:row;flex-wrap:wrap;gap:16px}
        .check-label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
        .sos-section{border-color:#fca5a5;background:#fef2f2}
        .sos-section h3,.sos-check{color:var(--dark-red);font-weight:600}
        .btn-group{display:flex;gap:12px;margin-top:24px}
        button{flex:1;padding:14px 24px;font-size:16px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s;color:#fff}
        .btn-primary{background:var(--primary)}
        .btn-primary:hover{background:var(--primary-hover)}
        .btn-secondary{background:#e5e7eb;color:#374151}
        .btn-secondary:hover{background:#d1d5db}
        #result-screen{display:none}
        .result-card{border-radius:12px;padding:32px;margin-bottom:24px;border-left:8px solid;background:#fff;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .risk-low{border-color:var(--green);background:#ecfdf5}
        .risk-mod{border-color:var(--yellow);background:#fffbeb}
        .risk-high{border-color:var(--red);background:#fef2f2}
        .risk-sos{border-color:var(--dark-red);background:#fef2f2;color:var(--dark-red)}
        .result-header{font-size:28px;font-weight:700;margin:0 0 24px}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:15px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid rgba(0,0,0,0.1)}
        ul{margin:0;padding-left:20px;font-size:15px}
        li{margin-bottom:6px}
        @media print{body{background:#fff;padding:0}.container{box-shadow:none;max-width:100%;padding:0}.btn-group{display:none!important}.section{border:none;padding:10px 0;margin-bottom:10px;page-break-inside:avoid}#form-screen{display:block!important}#result-screen{page-break-before:always}}
    </style>
</head>
<body>
<div class="container">
    <h2 id="main-title">Клинико-сестринская оценка риска осложнений</h2>
    <form id="form-screen">
        <div class="section">
            <h3>Данные пациента</h3>
            <div class="grid">
                <div class="field full"><label>ФИО пациента</label><input type="text" id="p_name" required></div>
                <div class="field"><label>Номер палаты</label><input type="text" id="p_room" required></div>
                <div class="field"><label>Возраст</label><input type="number" id="p_age" required></div>
                <div class="field full"><label>Диагноз</label><input type="text" id="p_diag" required></div>
                <div class="field"><label>Дата операции</label><input type="date" id="p_date" required></div>
                <div class="field"><label>Сутки после операции</label>
                    <select id="p_days"><option>1 сутки</option><option>2 сутки</option><option>3 сутки</option><option>4–5 сутки</option><option>6–7 сутки</option></select>
                </div>
                <div class="field"><label>Тип операции</label>
                    <div class="radio-group row">
                        <label class="check-label"><input type="radio" name="p_type" value="Плановая" checked> Плановая</label>
                        <label class="check-label"><input type="radio" name="p_type" value="Экстренная"> Экстренная</label>
                    </div>
                </div>
                <div class="field"><label>Тип вмешательства</label>
                    <select id="p_int_type"><option>Лапароскопическое</option><option>Открытое</option><option>Гнойно-хирургическое</option><option>Другое</option></select>
                </div>
                <div class="field full"><label>Наличие дренажей</label>
                    <div class="radio-group row">
                        <label class="check-label"><input type="radio" name="p_drains" value="no" checked onchange="toggleDrains()"> Нет</label>
                        <label class="check-label"><input type="radio" name="p_drains" value="yes" onchange="toggleDrains()"> Да</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="section" id="drains-block" style="display: none;">
            <h3>Оценка дренажей</h3>
            <div class="grid">
                <div class="field"><label>Количество дренажей</label><input type="number" id="d_qty" value="1"></div>
                <div class="field"><label>Характер отделяемого</label>
                    <select id="d_char" class="val-select" data-label="Характер отделяемого (дренаж)">
                        <option value="0|Нет">Нет / Серозное</option><option value="1|Геморрагическое">Геморрагическое</option><option value="2|Обильное геморрагическое">Обильное геморрагическое</option><option value="3|Гнойное">Гнойное</option>
                    </select>
                </div>
                <div class="field full"><label>Осложнения по дренажу (отметьте, если есть)</label>
                    <div class="checkbox-group row">
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Изменение характера отделяемого"> Изменение характера</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Резкое увеличение объема (дренаж)"> Резкое увеличение объема</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Прекращение при ухудшении"> Прекращение при ухудшении</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Неприятный запах (дренаж)"> Неприятный запах</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Клинические показатели</h3>
            <div class="grid">
                <div class="field"><label>Температура (°C)</label><input type="number" step="0.1" class="val-num" data-label="Температура" data-rule=">=38:2" data-sos=">=39.0"></div>
                <div class="field"><label>ЧСС (в мин)</label><input type="number" class="val-num" data-label="ЧСС" data-rule=">100:1" data-sos=">120"></div>
                <div class="field"><label>ЧДД (в мин)</label><input type="number" class="val-num" data-label="ЧДД" data-rule=">22:1" data-sos=">=30"></div>
                <div class="field"><label>Систолическое АД</label><input type="number" class="val-num" data-label="Сист. АД" data-rule="<100:1" data-sos="<90"></div>
                <div class="field"><label>SpO₂ (%)</label><input type="number" class="val-num" data-label="SpO2" data-rule="<94:2" data-sos="<90"></div>
                <div class="field"><label>Нарушение сознания</label>
                    <select class="val-select" data-label="Нарушение сознания"><option value="0|Нет">Нет</option><option value="2|Да">Да</option></select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Лабораторные показатели</h3>
            <div class="grid">
                <div class="field"><label>Лейкоциты (×10⁹/л)</label><input type="number" step="0.1" class="val-num" data-label="Лейкоциты" data-rule="<4:2,>12:2" data-sos="<3,>15"></div>
                <div class="field"><label>СРБ (мг/л)</label><input type="number" step="0.1" class="val-num" data-label="СРБ" data-rule=">60:2" data-sos=">100"></div>
                <div class="field"><label>Прокальцитонин (нг/мл)</label><input type="number" step="0.01" class="val-num" data-label="Прокальцитонин" data-rule=">=0.5:3" data-sos=">=2.0"></div>
                <div class="field"><label>Гемоглобин (г/л)</label><input type="number" class="val-num" data-label="Гемоглобин" data-rule="<100:2" data-sos="<80"></div>
                <div class="field"><label>Креатинин (мкмоль/л)</label><input type="number" class="val-num" data-label="Креатинин" data-rule=">120:1" data-sos=">150"></div>
                <div class="field"><label>Лактат (ммоль/л)</label><input type="number" step="0.1" class="val-num" data-label="Лактат" data-rule=">=2.5:2" data-sos=">=4.0"></div>
                <div class="field"><label>D-димер (нг/мл)</label><input type="number" class="val-num" data-label="D-димер" data-rule=">1000:1" data-sos=">3000"></div>
            </div>
        </div>

        <div class="section">
            <h3>Сестринский блок</h3>
            <div class="grid">
                <div class="field"><label>Боль по ВАШ (0-10)</label><input type="number" class="val-num" data-label="Боль по ВАШ" data-rule=">=4:1,>=7:2" data-sos=">=9"></div>
                <div class="field full"><label>Послеоперационная рана (отметьте, если есть)</label>
                    <div class="checkbox-group row">
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Гиперемия раны"> Гиперемия</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Отек раны"> Отек</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Инфильтрация"> Инфильтрация</label>
                        <label class="check-label"><input type="checkbox" class="val-check" value="2" data-label="Расхождение краев"> Расхождение краев</label>
                    </div>
                </div>
                <div class="field"><label>Состояние повязки</label>
                    <select class="val-select" data-label="Повязка"><option value="0|Сухая">Сухая</option><option value="1|Умеренно промокшая">Умеренно промокшая</option><option value="2|Обильно промокшая">Обильно промокшая</option></select>
                </div>
                <div class="field"><label>Отделяемое из раны</label>
                    <select class="val-select" data-label="Отделяемое из раны"><option value="0|Нет/Серозное">Нет / Серозное</option><option value="1|Геморрагическое">Геморрагическое</option><option value="2|Обильное геморрагическое">Обильное геморр.</option><option value="3|Гнойное">Гнойное</option></select>
                </div>
                <div class="field"><label>Мобилизация</label>
                    <select class="val-select" data-label="Мобилизация"><option value="0|Самостоятельная">Самостоятельная</option><option value="1|Ограниченная">Ограниченная</option><option value="2|Не мобилизируется">Не мобилизируется</option></select>
                </div>
            </div>
            
            <h4 style="margin-top:24px; margin-bottom:12px;">Общее состояние</h4>
            <div class="grid">
                <div class="field"><label>Сон</label><select class="val-select" data-label="Сон"><option value="0|Сохранен">Сохранен</option><option value="1|Нарушен">Нарушен</option><option value="2|Резко нарушен">Резко нарушен</option></select></div>
                <div class="field"><label>Тревожность</label><select class="val-select" data-label="Тревожность"><option value="0|Нет">Нет</option><option value="1|Умеренная">Умеренная</option><option value="2|Выраженная">Выраженная</option></select></div>
                <div class="field"><label>Слабость</label><select class="val-select" data-label="Слабость"><option value="0|Нет">Нет</option><option value="1|Умеренная">Умеренная</option><option value="2|Нарастающая">Нарастающая</option></select></div>
            </div>
        </div>

        <div class="section sos-section">
            <h3>🚨 SOS-признаки (отметьте, если есть)</h3>
            <div class="checkbox-group row">
                <label class="check-label sos-check"><input type="checkbox" class="manual-sos" value="Активное кровотечение"> Активное кровотечение</label>
                <label class="check-label sos-check"><input type="checkbox" class="manual-sos" value="Подозрение на сепсис"> Подозрение на сепсис</label>
                <label class="check-label sos-check"><input type="checkbox" class="manual-sos" value="Подозрение на ТЭЛА"> Подозрение на ТЭЛА</label>
                <label class="check-label sos-check"><input type="checkbox" class="manual-sos" value="Резкое ухудшение состояния"> Резкое ухудшение</label>
            </div>
        </div>
        <div class="btn-group"><button type="button" class="btn-primary" onclick="calculateRisk()">Рассчитать риск</button></div>
    </form>

    <div id="result-screen">
        <div class="result-card" id="res_card">
            <h3 class="result-header" id="res_title"></h3>
            <div class="info-grid">
                <div>Пациент: <span id="out_name"></span></div>
                <div>Палата: <span id="out_room"></span></div>
                <div>Диагноз: <span id="out_diag"></span></div>
                <div>Суммарный балл: <span id="out_score" style="font-size:18px; font-weight:bold;"></span></div>
                <div>Дата оценки: <span id="out_datetime"></span></div>
            </div>
            <div id="factors-container"><strong>Факторы риска:</strong><ul id="out_factors"></ul></div>
            <div style="margin-top: 20px;"><strong>Рекомендации:</strong><ul id="out_recs"></ul></div>
        </div>
        <div class="btn-group">
            <button type="button" class="btn-secondary" onclick="window.print()">Скачать PDF / Распечатать</button>
            <button type="button" class="btn-primary" onclick="resetForm()">Новый расчет</button>
        </div>
    </div>
</div>

<script>
    function toggleDrains() {
        document.getElementById('drains-block').style.display = document.querySelector('input[name="p_drains"]:checked').value === 'yes' ? 'block' : 'none';
    }
    function evalLogic(v, rStr) {
        if(!v||!rStr) return 0;
        let val=parseFloat(v), maxP=0;
        for(let r of rStr.split(',')){
            let p=r.split(':'), c=p[0].trim(), pts=p.length>1?parseInt(p[1]):1;
            let op=c.replace(/[0-9.-]/g,'').trim(), num=parseFloat(c.replace(/[^0-9.-]/g,'')), m=false;
            if(op==='<') m=val<num; else if(op==='<=') m=val<=num; else if(op==='>') m=val>num; else if(op==='>=') m=val>=num; else if(op==='==') m=val===num;
            if(m&&pts>maxP) maxP=pts;
        } return maxP;
    }
    function calculateRisk() {
        let totalScore=0, isSOS=false, rFact=[], sosR=[];
        document.querySelectorAll('.val-num').forEach(inp => {
            let v=inp.value; if(v!==''){
                if(inp.dataset.sos && evalLogic(v, inp.dataset.sos)>0) { isSOS=true; sosR.push(`${inp.dataset.label} (${v})`); }
                if(inp.dataset.rule) { let pts=evalLogic(v, inp.dataset.rule); if(pts>0) { totalScore+=pts; rFact.push(`${inp.dataset.label}: ${v}`); } }
            }
        });
        document.querySelectorAll('.val-select').forEach(sel => {
            if(sel.id==='d_char' && document.querySelector('input[name="p_drains"]:checked').value==='no') return;
            let p=sel.value.split('|'); if(p.length===2){ let pts=parseInt(p[0]); if(pts>0){ totalScore+=pts; rFact.push(`${sel.dataset.label}: ${p[1]}`); } }
        });
        document.querySelectorAll('.val-check:checked').forEach(cb => {
            if(cb.closest('#drains-block') && document.querySelector('input[name="p_drains"]:checked').value==='no') return;
            let pts=parseInt(cb.value); totalScore+=pts; rFact.push(`${cb.dataset.label}`);
        });
        document.querySelectorAll('.manual-sos:checked').forEach(cb => { isSOS=true; sosR.push(cb.value); });

        let cC="", tT="", rH="";
        if(isSOS){ cC="risk-sos"; tT="🚨 SOS-СОСТОЯНИЕ"; rH="<li>Срочно вызвать лечащего или дежурного врача;</li><li>Не оставлять пациента без наблюдения;</li><li>Проконтролировать АД, ЧСС, ЧДД, SpO₂, температуру;</li>"; rFact.push(`<strong>КРИТИЧЕСКИЕ ПРИЗНАКИ:</strong> ${sosR.join(', ')}`); }
        else if(totalScore>=10){ cC="risk-high"; tT="🔴 Высокий риск (≥10 баллов)"; rH="<li>Немедленно информировать лечащего/дежурного врача;</li><li>Провести внеплановый контроль витальных показателей;</li>"; }
        else if(totalScore>=5){ cC="risk-mod"; tT="🟡 Умеренный риск (5–9 баллов)"; rH="<li>Усилить сестринский мониторинг;</li><li>Повторно оценить витальные показатели через 4–6 часов;</li>"; }
        else{ cC="risk-low"; tT="🟢 Низкий риск (0–4 балла)"; rH="<li>Продолжить стандартное послеоперационное наблюдение;</li><li>Контролировать витальные показатели по графику;</li>"; }

        document.getElementById('out_name').innerText=document.getElementById('p_name').value||"Не указано";
        document.getElementById('out_room').innerText=document.getElementById('p_room').value||"-";
        document.getElementById('out_diag').innerText=document.getElementById('p_diag').value||"-";
        document.getElementById('out_score').innerText=isSOS?totalScore+" (SOS перекрывает баллы)":totalScore;
        document.getElementById('out_datetime').innerText=new Date().toLocaleString("ru-RU");
        document.getElementById('res_card').className="result-card "+cC;
        document.getElementById('res_title').innerText=tT; document.getElementById('out_recs').innerHTML=rH;
        let fL=document.getElementById('out_factors'); fL.innerHTML="";
        if(rFact.length>0){ document.getElementById('factors-container').style.display='block'; rFact.forEach(f=>{ let li=document.createElement('li'); li.innerHTML=f; fL.appendChild(li); }); } else { document.getElementById('factors-container').style.display='none'; }

        // ОТПРАВКА В GOOGLE ТАБЛИЦУ
        let rowData = [
            document.getElementById('p_name').value || "Не указано",
            document.getElementById('p_room').value || "-",
            document.getElementById('p_diag').value || "-",
            totalScore,
            tT,
            rFact.join(" | ")
        ];
        let formData = new FormData();
        formData.append("sheetName", "Клинико-сестринская шкала"); 
        formData.append("data", JSON.stringify(rowData));
        fetch("https://script.google.com/macros/s/AKfycby3oLTKfR-6hKtQ1pmSSARXTiVvm_IbhSpp2nM52A5C0z_cXw9oNn09GbztTGFMrlF8/exec", { method: "POST", mode: "no-cors", body: formData });

        document.getElementById('form-screen').style.display='none'; document.getElementById('main-title').style.display='none'; document.getElementById('result-screen').style.display='block'; window.scrollTo(0,0);
    }
    function resetForm() { location.reload(); }
</script>
</body>
</html>
